kind = "web"
previewPath = "/"
title = "FinSight"
version = "1.0.0"
id = "artifacts/finsight"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23970

[services.development]
run = "pnpm --filter @workspace/finsight run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/finsight", "run", "build" ]
run = "pnpm --filter @workspace/finsight run start"

[services.env]
PORT = "23970"
